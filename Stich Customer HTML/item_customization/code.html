<body class="bg-background text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed min-h-screen">
<!-- Top Navigation Bar (Shared Component Logic) -->
<header class="fixed top-0 w-full z-50 bg-[#fcf9f4] dark:bg-stone-950/80 backdrop-blur-md flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="text-[#59413d] opacity-70 hover:opacity-80 transition-opacity flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="text-2xl font-['Instrument_Serif'] italic text-[#59413d] dark:text-stone-200">SUSHIZEN</span>
</div>
<div class="text-[#a2281a] dark:text-[#c4402f] font-['Noto_Serif'] font-normal tracking-tight">
            LUNCH
        </div>
</header>
<main class="pt-16 pb-32 washi-texture">
<!-- Hero Section -->
<div class="relative w-full h-80 overflow-hidden">
<img alt="Salmon Nigiri" class="w-full h-full object-cover soft-fade-bottom" data-alt="Premium Salmon Nigiri on a black stone plate" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBWNCwCrd_A1_2edfsA_1vYd9UR7O64LKU0QJzqD_7DjnV59SLCUQWL0LbU3M7OnbSqafCsT30cLwNbhrjT8ji7sfE-jZRQGA_RnPWk67tj-zT8YQ5N_7FCKcgYixwQlVpJ8H8PxE29C--RIAix0o8q7UmFSkgFmXjFl6aQDCj75HTmN2xUucf13p4_wKtPnyLKKMN65m6MKy3QsF7dideNmui0ZjCxfWua5oSdazJdppXX89Q56X200jrrjbLojqhGGFZ3Hgbd0pPZ"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
</div>
<!-- Product Header -->
<section class="px-6 -mt-12 relative z-10">
<div class="flex justify-between items-baseline mb-2">
<h1 class="text-5xl font-display italic text-on-surface leading-tight">Salmon Nigiri</h1>
<span class="text-xl font-headline text-primary">¥850</span>
</div>
<p class="text-on-surface-variant font-jp leading-relaxed max-w-sm">
                Fresh Atlantic salmon over hand-pressed vinegared rice. Served with a touch of wasabi between the fish and rice. 
                <span class="block mt-2 text-xs uppercase tracking-widest opacity-60">Sustainable Source • 2 Pieces</span>
</p>
</section>
<!-- Modifiers Section -->
<section class="px-6 mt-12 space-y-10">
<!-- Condiments -->
<div>
<h2 class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-6 flex items-center gap-2">
<span class="w-8 h-[1px] bg-outline-variant opacity-30"></span>
                    Choose Your Modifiers
                </h2>
<div class="space-y-3">
<!-- Modifier Row: Extra Wasabi -->
<label class="group flex items-center justify-between p-4 rounded-xl bg-surface-container-lowest hover:bg-surface-container-high transition-all cursor-pointer">
<div class="flex items-center gap-4">
<div class="relative flex items-center">
<input class="peer h-5 w-5 rounded border-outline-variant text-primary focus:ring-primary transition-all" type="checkbox"/>
<span class="absolute hidden peer-checked:block text-primary">
<span class="material-symbols-outlined text-sm" data-icon="check" style="font-variation-settings: 'wght' 700;">check</span>
</span>
</div>
<span class="text-on-surface font-jp">Extra Wasabi</span>
</div>
<span class="text-sm font-headline text-on-surface-variant opacity-60">+ ¥50</span>
</label>
<!-- Modifier Row: No Ginger -->
<label class="group flex items-center justify-between p-4 rounded-xl bg-surface-container-lowest hover:bg-surface-container-high transition-all cursor-pointer">
<div class="flex items-center gap-4">
<input class="h-5 w-5 rounded border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<span class="text-on-surface font-jp">No Ginger</span>
</div>
<span class="text-sm font-headline text-on-surface-variant opacity-60">Free</span>
</label>
<!-- Modifier Row: Spicy Mayo -->
<label class="group flex items-center justify-between p-4 rounded-xl bg-surface-container-lowest hover:bg-surface-container-high transition-all cursor-pointer">
<div class="flex items-center gap-4">
<input class="h-5 w-5 rounded border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<span class="text-on-surface font-jp">Spicy Mayo Add-on</span>
</div>
<span class="text-sm font-headline text-on-surface-variant opacity-60">+ ¥100</span>
</label>
</div>
</div>
<!-- Selection Pills: Soy Sauce -->
<div>
<h2 class="text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-4">Soy Sauce Type</h2>
<div class="flex gap-3">
<button class="flex-1 py-3 px-4 rounded-xl border-2 border-primary bg-surface-container-lowest text-primary font-medium text-sm text-center">
                        Regular
                    </button>
<button class="flex-1 py-3 px-4 rounded-xl border-2 border-transparent bg-surface-container-lowest text-on-surface-variant font-medium text-sm text-center hover:bg-surface-container-high transition-all">
                        Low Sodium
                    </button>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-xl px-6 pt-4 pb-8 z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.03)]">

</button>
<span class="w-12 text-center font-headline text-xl">1</span>
<button class="w-10 h-10 flex items-center justify-center text-on-surface hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>

<span class="block text-[10px] uppercase tracking-widest text-on-surface-variant opacity-60">Total Amount</span>
<span class="text-2xl font-headline text-on-surface">¥900</span>
</div>
</div>

<button class="w-full bg-gradient-to-tr from-primary to-primary-container text-on-primary py-5 rounded-xl font-bold tracking-widest uppercase text-sm shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-lg" data-icon="shopping_bag">shopping_bag</span>
                Add to Order
            </button>
</div>
</div>

<div class="h-32 md:hidden"></div>
